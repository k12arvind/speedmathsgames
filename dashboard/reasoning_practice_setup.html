<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Practice Setup · Reasoning</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    body { background: var(--bg-primary); color: var(--text-primary); min-height:100vh; }
    .wrap { max-width:780px; margin:0 auto; padding:24px 18px 60px; }
    h1 { font-family:'Playfair Display',serif; font-size:clamp(1.4rem,3.5vw,1.9rem); margin:0 0 18px; }
    .head { display:flex; justify-content:space-between; align-items:center;
            flex-wrap:wrap; gap:14px; margin-bottom:24px; }
    .nav a { padding:7px 13px; background:var(--bg-input); color:var(--text-secondary);
             border:1px solid var(--border-color); border-radius:8px; font-size:13px;
             font-weight:600; text-decoration:none; }
    .nav a:hover { color:#f59e0b; border-color:#f59e0b; }

    .panel { background: var(--bg-card); border:1px solid var(--border-color);
             border-radius:12px; padding:20px; margin-bottom:14px; }
    .panel h2 { margin:0 0 12px; font-size:0.92rem; text-transform:uppercase;
                letter-spacing:0.05em; color: var(--text-muted); font-weight:600; }

    .topics { display:flex; flex-wrap:wrap; gap:8px; }
    .topic { display:flex; align-items:center; gap:8px; padding:9px 14px;
             background: var(--bg-input); border:1px solid var(--border-color);
             border-radius:8px; cursor:pointer; user-select:none; font-size:13px; }
    .topic input { display:none; }
    .topic.checked { background: rgba(245,158,11,0.10); border-color:#f59e0b; color:var(--text-primary); }
    .topic .ct { color: var(--text-muted); font-size:11px; }
    .topic.checked .ct { color:#f59e0b; }

    .opts { display:flex; gap:8px; flex-wrap:wrap; }
    .opts label {
      padding:9px 16px; background: var(--bg-input);
      border:1px solid var(--border-color); border-radius:8px;
      cursor:pointer; user-select:none; font-size:13px;
    }
    .opts input { display:none; }
    .opts label.checked { background: rgba(74,222,128,0.10); border-color: var(--accent-success);
                          color: var(--accent-success); }

    .start-btn {
      display:block; width:100%; padding:14px;
      background: linear-gradient(135deg,#f59e0b 0%,#ef4444 100%);
      color:#0a0a0c; border:none; border-radius:10px;
      font-size:15px; font-weight:700; cursor:pointer;
      transition: transform .1s;
    }
    .start-btn:hover { transform: translateY(-1px); }
    .start-btn[disabled] { opacity:0.5; cursor:not-allowed; }

    .info-banner { background: rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.30);
                   color:#fbbf24; padding:12px 16px; border-radius:8px;
                   margin-bottom:14px; font-size:0.88rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>✏️ Practice Setup</h1>
      <div class="nav"><a href="reasoning_hub.html">← Hub</a></div>
    </div>

    <div id="empty-banner" class="info-banner" style="display:none;">
      ⚠️ No questions in the bank yet. Once they're loaded, this page will let you pick filters.
    </div>

    <div class="panel">
      <h2>Topics <small style="text-transform:none;color:var(--text-muted);font-weight:400;">(none = all)</small></h2>
      <div id="topics" class="topics">Loading…</div>
    </div>

    <div class="panel">
      <h2>Sources <small style="text-transform:none;color:var(--text-muted);font-weight:400;">(none = all)</small></h2>
      <div id="sources" class="topics">Loading…</div>
    </div>

    <div class="panel">
      <h2>Number of questions</h2>
      <div class="opts" id="count">
        <label><input type="radio" name="cnt" value="5">5</label>
        <label><input type="radio" name="cnt" value="10" checked>10</label>
        <label><input type="radio" name="cnt" value="15">15</label>
        <label><input type="radio" name="cnt" value="25">25</label>
      </div>
    </div>

    <div class="panel">
      <h2>Time limit</h2>
      <div class="opts" id="time">
        <label><input type="radio" name="tl" value="0" checked>Untimed</label>
        <label><input type="radio" name="tl" value="60">1 min/Q</label>
        <label><input type="radio" name="tl" value="90">1.5 min/Q</label>
        <label><input type="radio" name="tl" value="120">2 min/Q</label>
      </div>
    </div>

    <button class="start-btn" id="start">Start Practice →</button>
  </div>

  <script src="auth.js"></script>
  <script>
    const API = window.location.origin;
    function userId() {
      try {
        const u = window.__currentUser || JSON.parse(localStorage.getItem('cachedUser')||'{}');
        return u.user_id || 'saanvi';
      } catch(e){ return 'saanvi'; }
    }

    let topicChecked = new Set();
    let sourceChecked = new Set();

    // pre-select from ?topics=X URL param
    const presetTopics = new URLSearchParams(location.search).get('topics');
    if (presetTopics) presetTopics.split(',').forEach(t => topicChecked.add(t));

    async function loadTopics(){
      const r = await fetch(API + '/api/reasoning/topics');
      const d = await r.json();
      const root = document.getElementById('topics');
      if (!d.topics || !d.topics.length) {
        root.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;">No topics yet.</div>';
        return;
      }
      d.topics.sort((a,b) => b.count - a.count);
      root.innerHTML = d.topics.map(t => `
        <label class="topic ${topicChecked.has(t.code) ? 'checked' : ''}" data-code="${t.code}">
          <input type="checkbox" ${topicChecked.has(t.code) ? 'checked' : ''}>
          <span>${t.name}</span>
          <span class="ct">${t.count}</span>
        </label>`).join('');
      root.querySelectorAll('.topic').forEach(el => {
        el.addEventListener('click', () => {
          el.classList.toggle('checked');
          const code = el.dataset.code;
          if (topicChecked.has(code)) topicChecked.delete(code); else topicChecked.add(code);
        });
      });
    }

    async function loadSources(){
      const r = await fetch(API + '/api/reasoning/sources');
      const d = await r.json();
      const root = document.getElementById('sources');
      if (!d.sources || !d.sources.length) {
        root.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;">No sources yet.</div>';
        return;
      }
      const labels = { arihant: 'Arihant — A New Approach', mkpandey: 'MK Pandey — Analytical Reasoning' };
      root.innerHTML = d.sources.map(s => `
        <label class="topic" data-code="${s.source_book}">
          <input type="checkbox">
          <span>${labels[s.source_book] || s.source_book}</span>
          <span class="ct">${s.n}</span>
        </label>`).join('');
      root.querySelectorAll('.topic').forEach(el => {
        el.addEventListener('click', () => {
          el.classList.toggle('checked');
          const code = el.dataset.code;
          if (sourceChecked.has(code)) sourceChecked.delete(code); else sourceChecked.add(code);
        });
      });
    }

    async function loadStats(){
      try {
        const r = await fetch(API + '/api/reasoning/stats');
        const d = await r.json();
        if ((d.total_questions || 0) === 0) document.getElementById('empty-banner').style.display = '';
      } catch(e){}
    }

    document.querySelectorAll('.opts').forEach(grp => {
      grp.addEventListener('change', e => {
        grp.querySelectorAll('label').forEach(l => l.classList.toggle(
          'checked', l.querySelector('input').checked));
      });
      grp.querySelectorAll('label').forEach(l =>
        l.classList.toggle('checked', l.querySelector('input').checked));
    });

    document.getElementById('start').addEventListener('click', async () => {
      const btn = document.getElementById('start');
      btn.disabled = true; btn.textContent = 'Starting…';
      const cnt = parseInt(document.querySelector('input[name=cnt]:checked').value, 10);
      const tl = parseInt(document.querySelector('input[name=tl]:checked').value, 10);
      const body = {
        user_id: userId(),
        topics: Array.from(topicChecked),
        sources: Array.from(sourceChecked),
        count: cnt,
        time_limit_seconds: tl * cnt,
      };
      try {
        const r = await fetch(API + '/api/reasoning/session/create', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(body)
        });
        const sess = await r.json();
        if (!sess.session_id) throw new Error(sess.error || 'no session');
        if (!sess.attempts || !sess.attempts.length) {
          alert('No questions matched these filters. Try removing some.');
          btn.disabled = false; btn.textContent = 'Start Practice →';
          return;
        }
        location.href = 'reasoning_practice_session.html?sid=' + encodeURIComponent(sess.session_id);
      } catch(e) {
        alert('Could not start: ' + e.message);
        btn.disabled = false; btn.textContent = 'Start Practice →';
      }
    });

    loadTopics();
    loadSources();
    loadStats();
  </script>
</body>
</html>
