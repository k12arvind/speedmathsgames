<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>My Progress · Physics</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    body { background: var(--bg-primary); color: var(--text-primary); min-height:100vh; }
    .wrap { max-width:1100px; margin:0 auto; padding:22px 18px 60px; }
    .head { display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px;
            margin-bottom:18px; align-items:center; }
    .head h1 { font-family:'Playfair Display',serif; margin:0; font-size:clamp(1.3rem,3vw,1.8rem); }
    .nav { display:flex; gap:6px; flex-wrap:wrap; }
    .nav a { padding:7px 13px; background:var(--bg-input); color:var(--text-secondary);
             border:1px solid var(--border-color); border-radius:8px; font-size:13px;
             font-weight:600; text-decoration:none; }
    .nav a:hover { color:#06b6d4; border-color:#06b6d4; }

    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:18px; }
    .stat { background:var(--bg-card); border:1px solid var(--border-color);
            border-radius:10px; padding:14px; text-align:center; }
    .stat-val { font-size:1.6rem; font-weight:700; }
    .stat-lbl { font-size:0.72rem; color:var(--text-muted); text-transform:uppercase;
                letter-spacing:0.05em; margin-top:3px; }

    .panel { background:var(--bg-card); border:1px solid var(--border-color);
             border-radius:12px; padding:18px; margin-bottom:14px; }
    .panel h2 { font-size:0.88rem; text-transform:uppercase; color:var(--text-muted);
                margin:0 0 14px; letter-spacing:0.05em; font-weight:600; }

    .bars { display:flex; gap:6px; align-items:flex-end; height:140px;
            border-bottom:1px solid var(--border-color); padding-bottom:6px; }
    .bar-col { flex:1; display:flex; flex-direction:column; align-items:center;
               gap:4px; min-width:0; }
    .bar { width:100%; max-width:36px; background: linear-gradient(0deg, #06b6d4 0%, #6366f1 100%);
           border-radius:4px 4px 0 0; min-height:2px; transition: height .3s; }
    .bar-lbl { font-size:0.62rem; color:var(--text-muted); white-space:nowrap; transform:rotate(-45deg); transform-origin:50% 0; }
    .bar-val { font-size:0.7rem; font-weight:600; color:var(--text-secondary); }

    .topic-row { display:grid; grid-template-columns: 1fr 60px 1fr 70px;
                  gap:12px; align-items:center; padding:8px 0; }
    .topic-row .name { font-weight:600; }
    .topic-row .ratio { color:var(--text-muted); font-size:0.85rem; text-align:right; }
    .topic-row .barwrap { background:var(--bg-input); height:8px; border-radius:4px; overflow:hidden; }
    .topic-row .barwrap > span { display:block; height:100%;
              background: linear-gradient(135deg, var(--accent-success), #06b6d4); }
    .topic-row .pct { font-weight:700; text-align:right; }
    .topic-row .pct.good { color:var(--accent-success); }
    .topic-row .pct.warn { color:#f59e0b; }
    .topic-row .pct.bad  { color:var(--accent-danger); }

    .session-row {
      display:grid; grid-template-columns: 100px 1fr 80px 80px;
      gap:10px; align-items:center; padding:10px 0;
      border-bottom:1px solid var(--border-subtle); font-size:0.88rem;
    }
    .session-row:last-child { border-bottom:none; }
    .session-row .when { color:var(--text-muted); font-size:0.78rem; }
    .session-row .acc.good { color:var(--accent-success); font-weight:600; }
    .session-row .acc.warn { color:#f59e0b; }
    .session-row .acc.bad  { color:var(--accent-danger); }

    .empty { color:var(--text-muted); padding:30px; text-align:center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>📈 My Progress</h1>
      <div class="nav">
        <a href="physics_practice_setup.html">✏️ Practice</a>
        <a href="physics_books.html">📚 Books</a>
        <a href="physics_hub.html">← Hub</a>
      </div>
    </div>

    <div class="stats" id="stats">
      <div class="stat"><div class="stat-val" id="streak"  style="color:#fb923c;">—</div><div class="stat-lbl">Day streak</div></div>
      <div class="stat"><div class="stat-val" id="total-q" style="color:#06b6d4;">—</div><div class="stat-lbl">Questions attempted</div></div>
      <div class="stat"><div class="stat-val" id="overall-acc" style="color:#4ade80;">—</div><div class="stat-lbl">Overall accuracy</div></div>
      <div class="stat"><div class="stat-val" id="sessions"   style="color:#6366f1;">—</div><div class="stat-lbl">Sessions</div></div>
    </div>

    <div class="panel">
      <h2>Last 14 days</h2>
      <div class="bars" id="bars"><div class="empty">No data yet</div></div>
    </div>

    <div class="panel">
      <h2>Topic mastery</h2>
      <div id="mastery"><div class="empty">No data yet</div></div>
    </div>

    <div class="panel">
      <h2>Recent sessions</h2>
      <div id="sessions-list"><div class="empty">No sessions yet</div></div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    const API = window.location.origin;
    const params = new URLSearchParams(location.search);
    function userId() {
      const override = params.get('user_id');
      if (override) return override;
      try {
        const u = window.__currentUser || JSON.parse(localStorage.getItem('cachedUser')||'{}');
        return u.user_id || 'navya';
      } catch(e){ return 'navya'; }
    }
    function fmtTime(s){ s=s||0; if(s<60) return s+'s'; return Math.floor(s/60)+'m'; }
    function fmtDate(d){
      if (!d) return '—';
      const dt = new Date(d);
      return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}) +
             ' ' + dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    }

    async function load(){
      const user = userId();
      const r = await fetch(API + '/api/physics/progress?user_id=' + encodeURIComponent(user));
      const d = await r.json();

      document.getElementById('streak').textContent = (d.streak || 0) + 'd';
      const tm = d.topic_mastery || [];
      const totalAttempted = tm.reduce((s,t)=>s+t.attempted,0);
      const totalCorrect = tm.reduce((s,t)=>s+t.correct,0);
      document.getElementById('total-q').textContent = totalAttempted.toLocaleString();
      document.getElementById('overall-acc').textContent = totalAttempted
        ? Math.round((totalCorrect/totalAttempted)*100) + '%' : '—';
      document.getElementById('sessions').textContent = (d.recent_sessions || []).length;

      const days = (d.daily_summary || []).slice(0, 14).reverse();
      const max = Math.max(1, ...days.map(x => x.attempted || 0));
      const barsRoot = document.getElementById('bars');
      if (days.length === 0) {
        barsRoot.innerHTML = '<div class="empty">No data yet</div>';
      } else {
        barsRoot.innerHTML = days.map(x => {
          const h = Math.round(((x.attempted||0) / max) * 120);
          const lbl = (x.day || '').slice(5);
          return `<div class="bar-col">
                    <span class="bar-val">${x.attempted||0}</span>
                    <div class="bar" style="height:${h}px;" title="${x.day}: ${x.attempted} attempted, ${x.correct} correct"></div>
                    <span class="bar-lbl">${lbl}</span>
                  </div>`;
        }).join('');
      }

      const masteryRoot = document.getElementById('mastery');
      if (!tm.length) masteryRoot.innerHTML = '<div class="empty">Practice to fill this in</div>';
      else masteryRoot.innerHTML = tm.map(t => {
        const acc = t.accuracy || 0;
        const cl = acc >= 75 ? 'good' : acc >= 50 ? 'warn' : 'bad';
        return `<div class="topic-row">
                  <div class="name">${t.topic_name}</div>
                  <div class="ratio">${t.correct}/${t.attempted}</div>
                  <div class="barwrap"><span style="width:${acc}%;"></span></div>
                  <div class="pct ${cl}">${acc}%</div>
                </div>`;
      }).join('');

      const sl = d.recent_sessions || [];
      const slRoot = document.getElementById('sessions-list');
      if (!sl.length) slRoot.innerHTML = '<div class="empty">No sessions yet — start with 5 questions.</div>';
      else slRoot.innerHTML = sl.map(s => {
        const acc = s.served_count ? Math.round((s.correct_count/s.served_count)*100) : 0;
        const cl = acc >= 75 ? 'good' : acc >= 50 ? 'warn' : 'bad';
        const filt = s.topic_filter && s.topic_filter.length
          ? s.topic_filter.join(', ') : 'All topics';
        return `<a href="physics_practice_results.html?sid=${encodeURIComponent(s.session_id)}"
                  style="text-decoration:none;color:inherit;">
                  <div class="session-row">
                    <div class="when">${fmtDate(s.created_at)}</div>
                    <div>${filt} · ${s.served_count} qs · ${fmtTime(s.elapsed_seconds)}</div>
                    <div class="acc ${cl}">${s.correct_count}/${s.served_count}</div>
                    <div class="acc ${cl}" style="text-align:right;">${acc}%</div>
                  </div>
                </a>`;
      }).join('');
    }
    load();
  </script>
</body>
</html>
