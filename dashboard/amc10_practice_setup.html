<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Practice Setup · AMC 10</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    body { background: var(--bg-primary); color: var(--text-primary); min-height:100vh; }
    .wrap { max-width:780px; margin:0 auto; padding:24px 18px 60px; }
    h1 { font-family:'Playfair Display',serif; font-size:clamp(1.4rem,3.5vw,1.9rem); margin:0 0 18px; }
    .head { display:flex; justify-content:space-between; align-items:center;
            flex-wrap:wrap; gap:14px; margin-bottom:24px; }
    .nav a { padding:7px 13px; background:var(--bg-input); color:var(--text-secondary);
             border:1px solid var(--border-color); border-radius:8px; font-size:13px;
             font-weight:600; text-decoration:none; }
    .nav a:hover { color:var(--accent-blue); border-color:var(--accent-blue); }

    .panel {
      background: var(--bg-card); border:1px solid var(--border-color);
      border-radius:12px; padding:20px; margin-bottom:14px;
    }
    .panel h2 {
      margin:0 0 12px; font-size:0.92rem; text-transform:uppercase;
      letter-spacing:0.05em; color: var(--text-muted); font-weight:600;
    }

    /* Topic chips */
    .topics { display:flex; flex-wrap:wrap; gap:8px; }
    .topic {
      display:flex; align-items:center; gap:8px; padding:9px 14px;
      background: var(--bg-input); border:1px solid var(--border-color);
      border-radius:8px; cursor:pointer; user-select:none; font-size:13px;
    }
    .topic input { display:none; }
    .topic.checked {
      background: rgba(96,165,250,0.10); border-color: var(--accent-blue);
      color: var(--text-primary);
    }
    .topic .ct { color: var(--text-muted); font-size:11px; }
    .topic.checked .ct { color: var(--accent-blue); }

    /* Radio chips (count, time, difficulty) */
    .opts { display:flex; gap:8px; flex-wrap:wrap; }
    .opts label {
      padding:9px 16px; background: var(--bg-input);
      border:1px solid var(--border-color); border-radius:8px;
      cursor:pointer; user-select:none; font-size:13px;
    }
    .opts input { display:none; }
    .opts label.checked {
      background: rgba(74,222,128,0.10); border-color: var(--accent-success);
      color: var(--accent-success);
    }

    .start-btn {
      display:block; width:100%; padding:14px;
      background: linear-gradient(135deg,#a78bfa 0%,#60a5fa 100%);
      color:#0a0a0c; border:none; border-radius:10px;
      font-size:15px; font-weight:700; cursor:pointer;
      transition: transform .1s;
    }
    .start-btn:hover { transform: translateY(-1px); }
    .start-btn[disabled] { opacity:0.5; cursor:not-allowed; }

    /* Year range */
    .year-range { display:grid; grid-template-columns:auto 1fr auto 1fr; gap:8px; align-items:center; }
    .year-range input {
      width:90px; padding:8px 10px; background:var(--bg-input);
      color:var(--text-primary); border:1px solid var(--border-color);
      border-radius:6px; font-size:13px; font-family:inherit;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>✏️ Practice Setup</h1>
      <div class="nav"><a href="amc10_hub.html">← Hub</a></div>
    </div>

    <div class="panel">
      <h2>Topics <small style="text-transform:none;color:var(--text-muted);font-weight:400;">(none = all)</small></h2>
      <div id="topics" class="topics">Loading…</div>
    </div>

    <div class="panel">
      <h2>Difficulty</h2>
      <div class="opts" id="difficulty">
        <label><input type="radio" name="diff" value=""        checked>Mixed</label>
        <label><input type="radio" name="diff" value="easy">Easy <small style="color:var(--text-muted);">(prob 1–10)</small></label>
        <label><input type="radio" name="diff" value="medium">Medium <small style="color:var(--text-muted);">(11–20)</small></label>
        <label><input type="radio" name="diff" value="hard">Hard <small style="color:var(--text-muted);">(21–25)</small></label>
      </div>
    </div>

    <div class="panel">
      <h2>Number of questions</h2>
      <div class="opts" id="count">
        <label><input type="radio" name="cnt" value="5">5</label>
        <label><input type="radio" name="cnt" value="10" checked>10</label>
        <label><input type="radio" name="cnt" value="15">15</label>
        <label><input type="radio" name="cnt" value="25">25 (full mock)</label>
      </div>
    </div>

    <div class="panel">
      <h2>Time limit</h2>
      <div class="opts" id="time">
        <label><input type="radio" name="tl" value="0" checked>Untimed</label>
        <label><input type="radio" name="tl" value="60">1 min/Q</label>
        <label><input type="radio" name="tl" value="120">2 min/Q</label>
        <label><input type="radio" name="tl" value="180">3 min/Q (real AMC)</label>
      </div>
    </div>

    <div class="panel">
      <h2>Year range</h2>
      <div class="year-range">
        <span style="color:var(--text-muted);font-size:13px;">From</span>
        <input type="number" id="ymin" value="2000" min="2000" max="2022">
        <span style="color:var(--text-muted);font-size:13px;">To</span>
        <input type="number" id="ymax" value="2022" min="2000" max="2022">
      </div>
    </div>

    <button class="start-btn" id="start">Start Practice →</button>
  </div>

  <script src="auth.js"></script>
  <script>
    const API = window.location.origin;
    function userId() {
      try {
        const u = window.__currentUser || JSON.parse(localStorage.getItem('cachedUser')||'{}');
        return u.user_id || 'navya';
      } catch(e){ return 'navya'; }
    }

    let topicChecked = new Set();

    async function loadTopics(){
      const r = await fetch(API + '/api/amc10/topics');
      const d = await r.json();
      const root = document.getElementById('topics');
      root.innerHTML = d.topics.map(t => `
        <label class="topic" data-code="${t.code}">
          <input type="checkbox">
          <span>${t.name}</span>
          <span class="ct">${t.count}</span>
        </label>`).join('');
      root.querySelectorAll('.topic').forEach(el => {
        el.addEventListener('click', () => {
          el.classList.toggle('checked');
          const code = el.dataset.code;
          if (topicChecked.has(code)) topicChecked.delete(code);
          else topicChecked.add(code);
        });
      });
    }

    // Highlight selected radio
    document.querySelectorAll('.opts').forEach(grp => {
      grp.addEventListener('change', e => {
        grp.querySelectorAll('label').forEach(l => l.classList.toggle(
          'checked', l.querySelector('input').checked));
      });
      // Initial highlight
      grp.querySelectorAll('label').forEach(l =>
        l.classList.toggle('checked', l.querySelector('input').checked));
    });

    document.getElementById('start').addEventListener('click', async () => {
      const btn = document.getElementById('start');
      btn.disabled = true; btn.textContent = 'Starting…';
      const body = {
        user_id: userId(),
        topics: Array.from(topicChecked),
        year_min: parseInt(document.getElementById('ymin').value, 10) || null,
        year_max: parseInt(document.getElementById('ymax').value, 10) || null,
        difficulty: document.querySelector('input[name=diff]:checked').value,
        count: parseInt(document.querySelector('input[name=cnt]:checked').value, 10),
        time_limit_seconds: parseInt(document.querySelector('input[name=tl]:checked').value, 10) *
                            parseInt(document.querySelector('input[name=cnt]:checked').value, 10),
      };
      try {
        const r = await fetch(API + '/api/amc10/session/create', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(body)
        });
        const sess = await r.json();
        if (!sess.session_id) throw new Error(sess.error || 'No session created');
        if (!sess.attempts || !sess.attempts.length) {
          alert('No questions matched these filters. Try widening the year range or removing filters.');
          btn.disabled = false; btn.textContent = 'Start Practice →';
          return;
        }
        location.href = 'amc10_practice_session.html?sid=' + encodeURIComponent(sess.session_id);
      } catch(e) {
        alert('Could not start session: ' + e.message);
        btn.disabled = false; btn.textContent = 'Start Practice →';
      }
    });

    loadTopics();
  </script>
</body>
</html>
