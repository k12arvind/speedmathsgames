<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Revision Dashboard</title>
    <link rel="stylesheet" href="shared-styles.css">
    <style>
        body { background: var(--bg-primary); min-height: 100vh; padding: 20px; color: var(--text-primary); }
        .container { max-width: 900px; margin: 0 auto; }

        .header {
            background: var(--bg-card); border: 1px solid var(--border-color);
            padding: 16px 20px; border-radius: 12px; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .header h1 {
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
        .nav-link {
            padding: 8px 14px; background: var(--bg-input); color: var(--text-secondary);
            border: 1px solid var(--border-color); border-radius: 8px;
            font-size: 13px; font-weight: 600; text-decoration: none;
        }
        .nav-link:hover { color: #f59e0b; border-color: #f59e0b; }

        .overview {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 10px; margin-bottom: 16px;
        }
        .ov-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 14px 10px; text-align: center;
        }
        .ov-val { font-size: 1.5rem; font-weight: 700; }
        .ov-lbl { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.03em; }

        .context-bar {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 10px 16px; margin-bottom: 16px;
            font-size: 0.82rem; color: var(--text-muted); display: flex;
            justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
        }
        .context-tag { padding: 3px 10px; border-radius: 999px; font-size: 0.72rem; font-weight: 600; }
        .context-tag.weekend { background: rgba(139,92,246,0.15); color: #a78bfa; }
        .context-tag.holiday { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .context-tag.ramp { background: rgba(239,68,68,0.15); color: #ef4444; }

        .queue-section { margin-bottom: 20px; }
        .queue-title {
            font-size: 0.85rem; font-weight: 700; color: var(--text-primary);
            margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
        }
        .queue-title .count {
            background: var(--bg-input); padding: 2px 8px; border-radius: 10px;
            font-size: 0.75rem; color: var(--text-muted);
        }

        .rev-item {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 10px; margin-bottom: 8px; overflow: hidden;
            border-left: 5px solid #94a3b8;
        }
        .rev-item[data-level="1"] { border-left-color: #10b966; }
        .rev-item[data-level="2"] { border-left-color: #2178d9; }
        .rev-item[data-level="3"] { border-left-color: #9c26b0; }
        .rev-item[data-level="4"] { border-left-color: #d91c1c; }
        .rev-item.new-item { border-left-color: #f59e0b; }

        .rev-item-body {
            padding: 12px 14px; display: flex; justify-content: space-between;
            align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .rev-info { flex: 1; min-width: 200px; }
        .rev-title { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; }
        .rev-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; gap: 10px; flex-wrap: wrap; }

        .rev-acc { font-size: 1rem; font-weight: 700; min-width: 45px; text-align: center; }
        .rev-acc.good { color: #10b966; }
        .rev-acc.fair { color: #2178d9; }
        .rev-acc.weak { color: #9c26b0; }
        .rev-acc.poor { color: #d91c1c; }
        .rev-acc.new { color: #f59e0b; }

        .rev-actions { display: flex; gap: 6px; }
        .rev-btn {
            padding: 6px 12px; border: 1px solid var(--border-color); border-radius: 6px;
            background: var(--bg-input); color: var(--text-primary); font-size: 0.78rem;
            cursor: pointer; text-decoration: none; white-space: nowrap;
        }
        .rev-btn:hover { border-color: #f59e0b; color: #f59e0b; }
        .rev-btn.primary { background: rgba(139,92,246,0.15); color: #a78bfa; border-color: rgba(139,92,246,0.3); }
        .rev-btn.success { background: rgba(16,185,129,0.15); color: #10b981; border-color: rgba(16,185,129,0.3); }

        .cat-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px; margin-bottom: 16px;
        }
        .cat-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 12px;
        }
        .cat-name { font-size: 0.82rem; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
        .cat-bar { height: 6px; border-radius: 3px; background: var(--bg-input); margin-bottom: 6px; overflow: hidden; }
        .cat-fill { height: 100%; border-radius: 3px; }
        .cat-stats { font-size: 0.72rem; color: var(--text-muted); display: flex; justify-content: space-between; }

        .progress-section {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 16px; margin-bottom: 16px;
        }
        .progress-section h3 { font-size: 0.9rem; color: var(--text-primary); margin: 0 0 12px; }
        .prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .prog-label { font-size: 0.8rem; color: var(--text-muted); min-width: 100px; }
        .prog-bar { flex: 1; height: 8px; background: var(--bg-input); border-radius: 4px; overflow: hidden; }
        .prog-fill { height: 100%; border-radius: 4px; }
        .prog-val { font-size: 0.8rem; font-weight: 600; min-width: 45px; text-align: right; }

        .test-section {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 16px; text-align: center; margin-bottom: 16px;
        }
        .test-btn {
            padding: 12px 28px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, #f59e0b, #d97706); color: white;
            font-size: 1rem; font-weight: 700; cursor: pointer;
        }
        .test-btn:hover { filter: brightness(1.1); }

        .empty-state { padding: 40px; text-align: center; color: var(--text-muted); }
        .loading { padding: 40px; text-align: center; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Smart Revision</h1>
            <div class="nav-links">
                <a href="revision_compilation.html" class="nav-link">Compilation</a>
                <a href="revision_settings.html" class="nav-link">Settings</a>
                <a href="comprehensive_dashboard.html" class="nav-link">GK Dashboard</a>
                <a href="index.html" class="nav-link">Home</a>
            </div>
        </div>

        <div class="overview" id="overview"></div>
        <div class="context-bar" id="context-bar"></div>
        <div id="queue-content"><div class="loading">Loading revision queue...</div></div>
        <div id="category-health"></div>
        <div id="progress-section"></div>

        <!-- Quick Actions -->
        <div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:10px;padding:14px 16px;margin-bottom:16px;">
            <div style="font-size:0.85rem;font-weight:700;color:var(--text-primary);margin-bottom:10px;">Quick Actions</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <a href="revision_compilation.html" class="nav-link" style="background:rgba(139,92,246,0.1);color:#a78bfa;border-color:rgba(139,92,246,0.3);">📚 View All Due Sections (Compilation)</a>
                <a href="comprehensive_dashboard.html" class="nav-link">📰 Read New PDFs</a>
                <a href="revision_settings.html" class="nav-link">⚙️ Adjust Settings</a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const API_BASE = window.location.origin;

        async function init() {
            try {
                const resp = await fetch(`${API_BASE}/api/revision/queue`);
                const data = await resp.json();
                renderOverview(data);
                renderContext(data.stats);
                renderQueue(data);
                renderCategoryHealth(data);
                renderProgress(data.schedule_stats);
            } catch (e) {
                document.getElementById('queue-content').innerHTML =
                    `<div class="empty-state" style="color:#ef4444;">Error: ${e.message}</div>`;
            }
        }

        function renderOverview(data) {
            const s = data.stats || {};
            const ss = data.schedule_stats || {};
            document.getElementById('overview').innerHTML = `
                <div class="ov-card"><div class="ov-val" style="color:#d91c1c;">${s.overdue || 0}</div><div class="ov-lbl">Overdue</div></div>
                <div class="ov-card"><div class="ov-val" style="color:#f59e0b;">${s.due_today || 0}</div><div class="ov-lbl">Due Today</div></div>
                <div class="ov-card"><div class="ov-val" style="color:#0ea5e9;">${s.estimated_minutes || 0}m</div><div class="ov-lbl">Est. Time</div></div>
                <div class="ov-card"><div class="ov-val" style="color:#10b966;">${ss.mastered || 0}</div><div class="ov-lbl">Mastered</div></div>
                <div class="ov-card"><div class="ov-val" style="color:#a78bfa;">${ss.streak || 0}</div><div class="ov-lbl">Day Streak</div></div>
            `;
        }

        function renderContext(s) {
            const tags = [];
            if (s.is_weekend) tags.push('<span class="context-tag weekend">Weekend · ' + Math.round(s.load_factor * 100) + '% load</span>');
            if (s.is_holiday) tags.push('<span class="context-tag holiday">Holiday · reduced load</span>');
            if (s.load_factor > 1) tags.push('<span class="context-tag ramp">Exam ramp · ' + Math.round(s.load_factor * 100) + '% load</span>');
            const showing = (s.showing_revision || 0) + (s.showing_new || 0);
            document.getElementById('context-bar').innerHTML = `
                <span>Showing ${showing} sections (${s.showing_revision || 0} revision + ${s.showing_new || 0} new)</span>
                <div>${tags.join(' ')}</div>
            `;
        }

        function renderQueue(data) {
            const revQueue = data.revision_queue || [];
            const newQueue = data.new_queue || [];
            const container = document.getElementById('queue-content');

            if (revQueue.length === 0 && newQueue.length === 0) {
                container.innerHTML = `<div class="empty-state">
                    <div style="font-size:2rem;margin-bottom:10px;">🎉</div>
                    <div style="font-size:1.1rem;font-weight:600;margin-bottom:6px;">All caught up!</div>
                    <div>No sections due for revision today. Read a new PDF or take a test to get started.</div>
                </div>`;
                return;
            }

            let html = '';
            const groups = [
                { level: 4, emoji: '🔴', title: 'Must Revise' },
                { level: 3, emoji: '🟣', title: 'Needs Revision' },
                { level: 2, emoji: '🔵', title: 'Weekly Review' },
                { level: 1, emoji: '🟢', title: 'Maintenance' },
                { level: 0, emoji: '⚪', title: 'Read, Not Tested' },
            ];

            for (const g of groups) {
                const items = revQueue.filter(r => r.revision_level === g.level);
                if (items.length > 0) {
                    html += `<div class="queue-section">
                        <div class="queue-title">${g.emoji} ${g.title} <span class="count">${items.length}</span></div>
                        ${items.map(renderRevItem).join('')}
                    </div>`;
                }
            }

            if (newQueue.length > 0) {
                html += `<div class="queue-section">
                    <div class="queue-title">📰 New Sections <span class="count">${newQueue.length}</span></div>
                    ${newQueue.map(renderNewItem).join('')}
                </div>`;
            }

            if (revQueue.length > 0) {
                html += `<div class="test-section">
                    <div style="color:var(--text-muted);font-size:0.85rem;margin-bottom:10px;">
                        After re-reading, verify your recall:
                    </div>
                    <button class="test-btn" onclick="startRevisionTest()" id="revision-test-btn">
                        📝 Take Revision Test
                    </button>
                    <div id="test-status" style="margin-top:8px;font-size:0.82rem;color:var(--text-muted);"></div>
                </div>`;
            }

            container.innerHTML = html;
        }

        function renderRevItem(r) {
            const acc = r.last_test_accuracy != null ? Math.round(r.last_test_accuracy) + '%' : '—';
            const accClass = r.last_test_accuracy >= 85 ? 'good' : r.last_test_accuracy >= 70 ? 'fair' :
                             r.last_test_accuracy >= 50 ? 'weak' : r.last_test_accuracy != null ? 'poor' : 'new';
            const overdue = (r.days_overdue || 0) > 0 ? `<span style="color:#d91c1c;">${r.days_overdue}d overdue</span>` : '';
            const lastRead = r.last_read_date ? daysAgo(r.last_read_date) : 'Never';
            const lastTest = r.last_test_date ? daysAgo(r.last_test_date) : 'Never';

            return `<div class="rev-item" data-level="${r.revision_level}">
                <div class="rev-item-body">
                    <div class="rev-info">
                        <div class="rev-title">${esc(r.section_title || 'Section ' + r.section_index)}</div>
                        <div class="rev-meta">
                            <span>${esc(r.category || '')}</span>
                            <span>${esc(r.pdf_filename || '')}</span>
                            ${overdue}
                        </div>
                        <div class="rev-meta">
                            <span>Read: ${lastRead}</span>
                            <span>Test: ${lastTest}</span>
                        </div>
                    </div>
                    <div class="rev-acc ${accClass}">${acc}</div>
                    <div class="rev-actions">
                        <a href="article_viewer.html?pdf=${encodeURIComponent(r.pdf_filename)}#section-${r.section_index}"
                           class="rev-btn primary" target="_blank">📖 Read</a>
                        <button class="rev-btn success" onclick="markRevised('${esc(r.pdf_filename)}', ${r.section_index}, this)">✅ Revised</button>
                    </div>
                </div>
            </div>`;
        }

        function renderNewItem(s) {
            return `<div class="rev-item new-item">
                <div class="rev-item-body">
                    <div class="rev-info">
                        <div class="rev-title">${esc(s.section_title || 'Section ' + s.section_index)}</div>
                        <div class="rev-meta">
                            <span>${esc(s.category || '')}</span>
                            <span>${esc(s.pdf_filename || '')}</span>
                        </div>
                    </div>
                    <div class="rev-acc new">NEW</div>
                    <div class="rev-actions">
                        <a href="article_viewer.html?pdf=${encodeURIComponent(s.pdf_filename)}#section-${s.section_index}"
                           class="rev-btn primary" target="_blank">📖 Read</a>
                    </div>
                </div>
            </div>`;
        }

        function renderCategoryHealth(data) {
            const revQueue = data.revision_queue || [];
            const catStats = {};
            for (const r of revQueue) {
                const cat = r.category || 'Other';
                if (!catStats[cat]) catStats[cat] = { due: 0, totalAcc: 0, accCount: 0 };
                catStats[cat].due++;
                if (r.last_test_accuracy != null) {
                    catStats[cat].totalAcc += r.last_test_accuracy;
                    catStats[cat].accCount++;
                }
            }
            const cats = Object.entries(catStats).sort((a, b) => b[1].due - a[1].due);
            if (cats.length === 0) { document.getElementById('category-health').innerHTML = ''; return; }

            document.getElementById('category-health').innerHTML = `
                <div style="font-size:0.85rem;font-weight:700;color:var(--text-primary);margin-bottom:10px;">Category Health</div>
                <div class="cat-grid">
                    ${cats.map(([cat, s]) => {
                        const avg = s.accCount > 0 ? Math.round(s.totalAcc / s.accCount) : 0;
                        const color = avg >= 85 ? '#10b966' : avg >= 70 ? '#2178d9' : avg >= 50 ? '#9c26b0' : s.accCount > 0 ? '#d91c1c' : '#94a3b8';
                        return `<div class="cat-card">
                            <div class="cat-name">${esc(cat)}</div>
                            <div class="cat-bar"><div class="cat-fill" style="width:${avg}%;background:${color};"></div></div>
                            <div class="cat-stats"><span>${avg}% avg</span><span>${s.due} due</span></div>
                        </div>`;
                    }).join('')}
                </div>
            `;
        }

        function renderProgress(ss) {
            if (!ss) return;
            document.getElementById('progress-section').innerHTML = `
                <div class="progress-section">
                    <h3>Revision Progress</h3>
                    <div class="prog-row">
                        <span class="prog-label">Read</span>
                        <div class="prog-bar"><div class="prog-fill" style="width:${ss.read_percent}%;background:#0ea5e9;"></div></div>
                        <span class="prog-val" style="color:#0ea5e9;">${ss.read_percent}%</span>
                    </div>
                    <div class="prog-row">
                        <span class="prog-label">Mastered</span>
                        <div class="prog-bar"><div class="prog-fill" style="width:${ss.mastered_percent}%;background:#10b966;"></div></div>
                        <span class="prog-val" style="color:#10b966;">${ss.mastered_percent}%</span>
                    </div>
                    <div style="font-size:0.78rem;color:var(--text-muted);margin-top:8px;">
                        ${ss.total_scheduled} of ${ss.total_sections} sections tracked · ${ss.mastered} mastered
                    </div>
                </div>
            `;
        }

        async function startRevisionTest() {
            const btn = document.getElementById('revision-test-btn');
            const status = document.getElementById('test-status');
            btn.disabled = true;
            btn.textContent = '⏳ Preparing test...';
            status.textContent = 'Collecting questions from due sections...';

            try {
                const resp = await fetch(`${API_BASE}/api/revision/create-test`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({}),
                });
                const data = await resp.json();

                if (data.error) {
                    status.textContent = data.error;
                    status.style.color = '#ef4444';
                    btn.disabled = false;
                    btn.textContent = '📝 Take Revision Test';
                    return;
                }

                if (!data.questions || data.questions.length === 0) {
                    status.textContent = 'No questions available. Read some sections first.';
                    btn.disabled = false;
                    btn.textContent = '📝 Take Revision Test';
                    return;
                }

                // Store test data in sessionStorage and redirect to assessment page
                const sections = data.sections_covered || [];
                const sectionNames = sections.map(s => s.section_title || s.category).slice(0, 5).join(', ');

                status.textContent = `${data.total_questions} questions from ${sections.length} sections. Launching test...`;
                status.style.color = '#10b981';

                // Store for the assessment page to pick up
                sessionStorage.setItem('revision_test', JSON.stringify({
                    session_id: data.session_id,
                    questions: data.questions,
                    total_questions: data.total_questions,
                    sections_covered: sections,
                    is_revision_test: true,
                }));

                // Redirect to assessment page in revision mode
                window.location.href = `assessment.html?mode=revision`;

            } catch (e) {
                status.textContent = 'Error: ' + e.message;
                status.style.color = '#ef4444';
                btn.disabled = false;
                btn.textContent = '📝 Take Revision Test';
            }
        }

        async function markRevised(pdfFilename, sectionIndex, btn) {
            btn.textContent = '✅ Done!';
            btn.style.opacity = '0.5';
            btn.style.pointerEvents = 'none';
            try {
                await fetch(`${API_BASE}/api/revision/mark-revised`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pdf_filename: pdfFilename, section_index: sectionIndex }),
                });
            } catch (e) { console.warn(e); }
        }

        function daysAgo(dateStr) {
            if (!dateStr) return 'Never';
            const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
            if (diff === 0) return 'Today';
            if (diff === 1) return 'Yesterday';
            return diff + 'd ago';
        }

        function esc(s) {
            return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        window.onload = init;
    </script>
</body>
</html>
