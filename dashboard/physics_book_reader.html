<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Physics Reader</title>
  <style>
    html, body { margin:0; padding:0; height:100%; background:#0a0a0c; color:#f5f5f5;
                  font-family: -apple-system, system-ui, Segoe UI, Roboto, sans-serif; }
    .frame { display:flex; flex-direction:column; height:100vh; }
    header {
      display:flex; align-items:center; gap:12px; padding:10px 14px;
      background:#141418; border-bottom:1px solid rgba(6,182,212,0.20);
    }
    header .title { font-weight:600; font-size:0.92rem; }
    header .meta  { color:#a8a8a8; font-size:0.8rem; }
    header .nav   { margin-left:auto; display:flex; gap:6px; }
    header select, header a {
      background:#18181d; color:#f5f5f5; border:1px solid rgba(6,182,212,0.20);
      border-radius:6px; padding:6px 10px; font-size:13px; text-decoration:none;
    }
    header select { max-width:280px; }
    .empty { padding:40px 20px; text-align:center; color:#666; }
    iframe { flex:1; width:100%; border:none; background:#0b0d10; }
  </style>
</head>
<body>
  <div class="frame">
    <header>
      <div>
        <div class="title" id="book-title">Loading…</div>
        <div class="meta" id="book-meta">—</div>
      </div>
      <div class="nav">
        <select id="chapter-pick" onchange="goto()"></select>
        <a href="physics_books.html">← Books</a>
      </div>
    </header>
    <iframe id="reader" src="about:blank"></iframe>
  </div>

  <script src="auth.js"></script>
  <script>
    const API = window.location.origin;
    const params = new URLSearchParams(location.search);
    const bookId = params.get('book');
    let chapters = [];
    let book = null;

    function userId() {
      try {
        const u = window.__currentUser || JSON.parse(localStorage.getItem('cachedUser')||'{}');
        return u.user_id || 'navya';
      } catch(e){ return 'navya'; }
    }

    async function load(){
      if (!bookId) { document.body.innerHTML = '<div class="empty">No book specified.</div>'; return; }
      const r = await fetch(API + '/api/physics/books?user_id=' + encodeURIComponent(userId()));
      const d = await r.json();
      book = (d.books || []).find(b => b.book_id === bookId);
      if (!book) { document.body.innerHTML = '<div class="empty">Book not found.</div>'; return; }
      document.getElementById('book-title').textContent = book.title;
      document.getElementById('book-meta').textContent = `${book.total_pages} pages · ${book.chapter_count} chapters`;
      document.title = book.title + ' · Physics Reader';

      const r2 = await fetch(API + '/api/physics/book/' + encodeURIComponent(bookId) + '/chapters?user_id=' + encodeURIComponent(userId()));
      chapters = (await r2.json()).chapters;
      const sel = document.getElementById('chapter-pick');
      sel.innerHTML = chapters.map(ch => {
        const pct = (ch.page_end - ch.page_start + 1) ? Math.min(100, Math.round(ch.pages_seen / (ch.page_end - ch.page_start + 1) * 100)) : 0;
        const tick = ch.completed ? ' ✓' : (pct ? ` (${pct}%)` : '');
        return `<option value="${ch.chapter_number}">${ch.chapter_number}. ${ch.title}${tick}</option>`;
      }).join('');

      const lastIdx = chapters.findIndex(c => c.last_page_viewed);
      sel.value = lastIdx >= 0 ? chapters[lastIdx].chapter_number : chapters[0]?.chapter_number;
      goto();
    }

    function goto(){
      const num = parseInt(document.getElementById('chapter-pick').value, 10);
      const ch = chapters.find(c => c.chapter_number === num);
      if (!ch) return;
      document.getElementById('reader').src =
        '/static/PhysicsBooksHTML/' + encodeURIComponent(bookId) + '/' + ch.html_filename;
    }

    // The chapter HTML is generated by convert_math_book_to_html.py and posts
    // 'math_book_page_view' messages — we accept that exact event type here
    // and forward to the physics endpoint.
    window.addEventListener('message', ev => {
      const m = ev.data;
      if (!m || m.type !== 'math_book_page_view') return;
      const payload = JSON.stringify({
        user_id: userId(),
        book_id: m.book_id, chapter_number: m.chapter_num,
        page_number: m.page_num, seconds: m.seconds,
      });
      try {
        fetch(API + '/api/physics/book-view', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: payload, keepalive: true,
        }).catch(()=>{});
      } catch (e) {
        if (navigator.sendBeacon) {
          navigator.sendBeacon(
            API + '/api/physics/book-view',
            new Blob([payload], { type: 'application/json' })
          );
        }
      }
    });

    load();
  </script>
</body>
</html>
